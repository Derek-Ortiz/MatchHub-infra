version: '3.8'

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-16.3-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-matchhub}-db
    restart: unless-stopped
    
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: --encoding=UTF8
      TZ: UTC
    
    ports:
      - "${DB_PORT}:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./SCHEMA_MODIFICADO_V2.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./SEED_VIDEOJUEGOS_FINAL.sql:/docker-entrypoint-initdb.d/02-seed-videojuegos.sql
      - ./SEED_PREFERENCIAS_FINAL.sql:/docker-entrypoint-initdb.d/03-seed-preferencias.sql
      - ./SP_BUSCAR_COMPATIBLES_CORREGIDO.sql:/docker-entrypoint-initdb.d/04-stored-procedures.sql
      - ./FUNCTION_CALCULAR_COMPATIBILITY_CORREGIDA.sql:/docker-entrypoint-initdb.d/05-functions.sql
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    networks:
      - matchhub-network

volumes:
  postgres_data:
    driver: local

networks:
  matchhub-network:
    driver: bridge
